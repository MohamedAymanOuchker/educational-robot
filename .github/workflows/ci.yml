name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  firmware:
    name: Firmware (PlatformIO build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run

  app:
    name: Mobile app (flutter analyze)
    runs-on: ubuntu-latest
    # Informational for now: the app has known pre-existing analyzer issues.
    # Flip this to false once they are fixed to make it a required gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: mobile-app
        run: flutter pub get

      - name: Analyze
        working-directory: mobile-app
        run: flutter analyze
